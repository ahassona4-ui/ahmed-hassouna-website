{% assign article = include.item %}
<article class="knowledge-card"><span>{{ article.category | default: 'Knowledge Center' }}</span>{% if article.publication_date_state == 'recorded' and article.published_at %}<time datetime="{{ article.published_at | date: '%Y-%m-%d' }}">{{ article.published_at | date: '%Y-%m-%d' }}</time>{% endif %}<h3 data-ar="{{ article.title.ar | escape }}" data-en="{{ article.title.en | escape }}">{{ article.title.ar }}</h3><p data-ar="{{ article.summary.ar | escape }}" data-en="{{ article.summary.en | escape }}">{{ article.summary.ar }}</p><a data-ar="اقرأ المقال" data-en="Read article" href="{{ article.url | relative_url }}">اقرأ المقال</a></article>
