{% assign identity = site.data.site %}
<footer class="site-footer inner-footer"><div class="container footer-main"><div class="footer-brand"><img alt="AH" height="64" src="{{ identity.brand.logo | relative_url }}" width="64"/><div><strong data-ar="{{ identity.name.ar | escape }}" data-en="{{ identity.name.en | escape }}">{{ identity.name.ar }}</strong><span data-ar="{{ identity.role.ar | escape }}" data-en="{{ identity.role.en | escape }}">{{ identity.role.ar }}</span></div></div><p data-ar="{{ identity.footer.statement.ar | escape }}" data-en="{{ identity.footer.statement.en | escape }}">{{ identity.footer.statement.ar }}</p></div><div class="container footer-bottom"><span>{{ identity.footer.copyright }}</span><span>{{ identity.footer.location }}</span></div></footer>
